version: "3.9"
services:
  frontend:
    container_name: woot-index-frontend
    image: 192.168.4.248:5000/woot-index-frontend:latest
    restart: always
    ports:
      - "3300:3300"
    environment:
      WOOT_INDEX_API_BASE_URL: "${WOOT_INDEX_API_BASE_URL}"
      WOOT_INDEX_API_ADMIN_KEY: "${WOOT_INDEX_API_ADMIN_KEY}"
      PORT: 3300
